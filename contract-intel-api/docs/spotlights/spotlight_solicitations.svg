<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2137"/>
      <stop offset="1" stop-color="#071527"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b942" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f5b942" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- document + live pulse on right -->
  <g transform="translate(900,314)">
    <rect x="-70" y="-130" width="200" height="260" rx="14" fill="#122941" stroke="#2c4a68" stroke-width="2"/>
    <line x1="-40" y1="-85" x2="100" y2="-85" stroke="#3d648c" stroke-width="8" stroke-linecap="round"/>
    <line x1="-40" y1="-45" x2="100" y2="-45" stroke="#3d648c" stroke-width="8" stroke-linecap="round"/>
    <line x1="-40" y1="-5" x2="60" y2="-5" stroke="#3d648c" stroke-width="8" stroke-linecap="round"/>
    <line x1="-40" y1="55" x2="40" y2="55" stroke="#2c4a68" stroke-width="8" stroke-linecap="round"/>
    <!-- live pulse dot -->
    <circle cx="110" cy="-115" r="52" fill="url(#pulse)"/>
    <circle cx="110" cy="-115" r="18" fill="#f5b942"/>
  </g>

  <text x="80" y="150" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#f5b942" letter-spacing="3">LIVE SOLICITATIONS</text>
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">Open opportunities,</text>
  <text x="80" y="303" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">straight from SAM.gov.</text>
  <text x="80" y="372" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">Live notices with response deadlines,</text>
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">set-aside type, and links to the source.</text>

  <rect x="80" y="455" width="700" height="92" rx="12" fill="#12294170" stroke="#2c4a68" stroke-width="1.5"/>
  <circle cx="120" cy="501" r="10" fill="#f5b942"/>
  <text x="150" y="493" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e8eef5">NFPC Three Year Filter IDIQ &#183; Navy</text>
  <text x="150" y="524" font-family="Arial, sans-serif" font-size="20" fill="#9db4cc">response due Aug 1, 2026</text>
</svg>
