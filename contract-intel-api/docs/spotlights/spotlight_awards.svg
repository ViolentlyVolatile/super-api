<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2137"/>
      <stop offset="1" stop-color="#071527"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- magnifier + bars motif on right -->
  <g transform="translate(900,314)">
    <!-- bar chart -->
    <rect x="-40" y="20" width="34" height="90" rx="4" fill="#2c4a68"/>
    <rect x="8" y="-30" width="34" height="140" rx="4" fill="#3d648c"/>
    <rect x="56" y="-90" width="34" height="200" rx="4" fill="#f5b942"/>
    <rect x="104" y="10" width="34" height="100" rx="4" fill="#2c4a68"/>
    <!-- magnifier -->
    <circle cx="70" cy="-40" r="86" fill="none" stroke="#e8eef5" stroke-width="9" opacity="0.9"/>
    <line x1="132" y1="22" x2="185" y2="75" stroke="#e8eef5" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  </g>

  <text x="80" y="150" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#f5b942" letter-spacing="3">AWARD SEARCH</text>
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">Search $700B+ of</text>
  <text x="80" y="303" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">federal awards.</text>
  <text x="80" y="372" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">Filter by keyword, NAICS, PSC, agency,</text>
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">vendor, amount, and action-date window.</text>

  <rect x="80" y="455" width="700" height="92" rx="12" fill="#12294170" stroke="#2c4a68" stroke-width="1.5"/>
  <text x="112" y="493" font-family="'Courier New', monospace" font-size="21" fill="#f5b942">POST /v1/awards/search</text>
  <text x="112" y="524" font-family="Arial, sans-serif" font-size="20" fill="#9db4cc">who won what, since FY2008, government-wide</text>
</svg>
