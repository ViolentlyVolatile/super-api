<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2137"/>
      <stop offset="1" stop-color="#071527"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5b942" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f5b942" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b942" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f5b942" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- radar on the right -->
  <g transform="translate(940,314)">
    <circle r="230" fill="none" stroke="#2c4a68" stroke-width="2.5"/>
    <circle r="165" fill="none" stroke="#274361" stroke-width="2"/>
    <circle r="100" fill="none" stroke="#223c58" stroke-width="2"/>
    <line x1="-230" y1="0" x2="230" y2="0" stroke="#223c58" stroke-width="2"/>
    <line x1="0" y1="-230" x2="0" y2="230" stroke="#223c58" stroke-width="2"/>
    <path d="M0,0 L115,-199.2 A230,230 0 0 1 230,0 Z" fill="url(#sweep)"/>
    <line x1="0" y1="0" x2="115" y2="-199.2" stroke="#f5b942" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-135" cy="-80" r="9" fill="#4f7ba6"/>
    <circle cx="-70" cy="120" r="9" fill="#4f7ba6"/>
    <circle cx="150" cy="-88" r="60" fill="url(#glow)"/>
    <circle cx="150" cy="-88" r="22" fill="#f5b942"/>
    <text x="150" y="-79" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0d2137">$</text>
    <circle r="8" fill="#e8eef5"/>
  </g>

  <!-- text -->
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#f5b942" letter-spacing="3">RECOMPETE RADAR</text>
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">Find contracts before</text>
  <text x="80" y="303" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#e8eef5">the RFP drops.</text>
  <text x="80" y="372" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">Every expiring contract, scored 0&#8211;100 by</text>
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="#9db4cc">size and time-to-expiry. One POST request.</text>

  <!-- data chip -->
  <rect x="80" y="455" width="640" height="92" rx="12" fill="#12294170" stroke="#2c4a68" stroke-width="1.5"/>
  <circle cx="120" cy="501" r="10" fill="#f5b942"/>
  <text x="150" y="493" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#e8eef5">$1.5B  Oracle / VA EHR hosting</text>
  <text x="150" y="524" font-family="Arial, sans-serif" font-size="20" fill="#9db4cc">expires May 2027  &#183;  score 65.3</text>
</svg>
