<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37BBFE"/>
      <stop offset="0.55" stop-color="#1E8FD5"/>
      <stop offset="1" stop-color="#12608F"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E8F4FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0B3F63" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="500" height="500" rx="112" ry="112" fill="url(#bg)"/>

  <!-- rising analytics trail (channel growth / intelligence) -->
  <g stroke="#BFE6FF" stroke-opacity="0.85" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M108 372 L188 322 L262 350 L360 250"/>
  </g>
  <g fill="#EAF6FF">
    <circle cx="108" cy="372" r="15"/>
    <circle cx="188" cy="322" r="15"/>
    <circle cx="262" cy="350" r="15"/>
  </g>

  <!-- paper plane (send / broadcast) -->
  <g filter="url(#soft)">
    <!-- main body -->
    <path d="M392 118 L150 236 L246 276 L300 232 L268 300 L360 344 Z" fill="url(#plane)"/>
    <!-- inner fold for depth -->
    <path d="M392 118 L246 276 L268 300 Z" fill="#B9DCF5"/>
  </g>
</svg>
